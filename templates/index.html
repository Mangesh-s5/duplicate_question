<!doctype html>
<html>
  <head>
    <title>Duplicate Question Checker</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <h2>Duplicate Question Detection</h2>

    <form method="POST">
      <input
        type="text"
        name="q1"
        placeholder="Enter Question 1"
        required
      /><br /><br />
      <input
        type="text"
        name="q2"
        placeholder="Enter Question 2"
        required
      /><br /><br />
      <button type="submit">Check</button>
    </form>

    {% if result %}
    <h3>Result: {{ result }}</h3>
    <h4>Similarity Score: {{ score }}</h4>
    {% endif %}
  </body>
</html>
